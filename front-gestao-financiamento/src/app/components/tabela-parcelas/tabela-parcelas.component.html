<div class="filtros-container">
  <input 
    type="text" 
    placeholder="Nº da parcela..." 
    (input)="aplicarFiltros($event, 'numero')"
    class="input-busca desloca"
  >

  <select (change)="aplicarFiltros($event, 'status')" class="select-filtro desloca">
    <option value="">Todos os Status</option>
    <option value="paga">Pagas</option>
    <option value="pendente">Pendentes</option>
  </select>

  <select (change)="aplicarFiltros($event, 'data')" class="select-filtro desloca">
    <option value="">Todos os meses</option>
    <option *ngFor="let data of datasDisponiveis" [value]="data">
      {{ data }}
    </option>
  </select>
</div>

<table class="tabela-parcelas">
    <thead>
        <tr>
            <th>ID</th>
            <th>Mês de vencimento</th>
            <th>Número da parcela</th>
            <th>Projeção do valor</th>
            <th>Valor pago</th>
            <th>Data do pagamento</th>
            <th>Situação da parcela</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for(parcela of parcelasFiltradas; track parcela.ID){
            <tr app-parcela [parcela]="parcela"
            (registrarPagamento)="abrirModal($event)">
            </tr>
        }   
    </tbody>
</table>

<div class="modal-overlay" *ngIf="parcelaSelecionada">
  <div class="modal-card">
    <div class="modal-header">
      <h3> Atualizar Parcela #{{ parcelaSelecionada.NumeroParcela }}</h3>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Data efetiva do pagamento</label>
        <input type="date" [(ngModel)]="dadosUpdate.dataPagamento">
      </div>

      <div class="form-group">
        <label>Valor efetivamente pago(R$)</label>
        <input type="number" [(ngModel)]="dadosUpdate.valorPago">
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="dadosUpdate.situacao">
          <option value="paga">Pago</option>
          <option value="parcial">Parcial</option>
          <option value="pendente">Pendente</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="fecharModal()">Cancelar</button>
      <button class="btn-confirm" (click)="confirmarUpdate()">Confirmar alteração</button>
    </div>
  </div>
</div>
